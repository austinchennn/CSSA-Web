# 本地开发环境：PostgreSQL + Redis
# 启动：docker-compose up -d
# 停止：docker-compose down
# 重置数据：docker-compose down -v

services:
  postgres:
    image: postgres:15-alpine
    container_name: cssa_postgres
    environment:
      POSTGRES_DB: cssa_web_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cssa_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
