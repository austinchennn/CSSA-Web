# ── 自定义扩展 ────────────────────────────────────────────────────────────────

# 报名人数统计：后台活动列表页用于显示"已报名 X / 上限 Y"
extend type Query {
  # 查询指定活动的当前报名人数（公开接口，无需鉴权）
  registrationCountByEvent(eventId: ID!): Int
}

